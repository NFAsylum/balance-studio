# Local production-like stack: backend + Redis. Exercises the CACHE_BACKEND=redis path.
# Run from repo root: `docker compose -f deploy/docker-compose.yml up --build`
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      LLM_BACKEND: fake # or "local" with LOCAL_LLM_URL set
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      SCENARIOS_DIR: /data/scenarios
    volumes:
      - balance_data:/data
    depends_on:
      - redis

volumes:
  redis_data:
  balance_data:
